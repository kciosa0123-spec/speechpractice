<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeechPractice</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #d9e0ea;
      --text: #1d2433;
      --sub: #5b667a;
      --accent: #2f6fed;
      --accent2: #1f56c2;
      --danger: #c0392b;
      --ok: #1f8f4e;
      --shadow: 0 8px 24px rgba(20, 31, 61, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px;
    }

    .app-title {
      margin: 0 0 8px;
      font-size: 1.9rem;
      font-weight: 700;
    }

    .app-subtitle {
      margin: 0 0 20px;
      color: var(--sub);
      font-size: 0.98rem;
    }

    .notice {
      background: #eef4ff;
      border: 1px solid #cfe0ff;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      color: #27406d;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }

    @media (max-width: 920px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
    }

    .panel h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    textarea,
    select,
    input[type="range"] {
      width: 100%;
    }

    textarea,
    select {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    .small-textarea {
      min-height: 150px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }
    }

    .row-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    @media (max-width: 700px) {
      .row-2 {
        grid-template-columns: 1fr;
      }
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: 0.15s ease;
    }

    button:hover {
      background: var(--accent2);
    }

    button.secondary {
      background: #eef2f8;
      color: #24324a;
      border: 1px solid var(--line);
    }

    button.secondary:hover {
      background: #e5ebf5;
    }

    button.danger {
      background: var(--danger);
    }

    button.success {
      background: var(--ok);
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .stats {
      margin-top: 8px;
      color: var(--sub);
      font-size: 0.9rem;
    }

    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcfe;
      color: #31405c;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .slider-wrap {
      display: grid;
      gap: 6px;
    }

    .slider-value {
      color: var(--sub);
      font-size: 0.88rem;
    }

    .audio-player {
      width: 100%;
      margin-top: 10px;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--sub);
      font-size: 0.88rem;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="app-title">SpeechPractice</h1>
    <p class="app-subtitle">
      スクリプト読み上げ・録音・音声認識を1つにまとめた練習アプリ
    </p>

    <div class="notice">
      推奨環境は <strong>Windows の Edge</strong> です。<br>
      端末やブラウザによっては、録音のみ動作し、音声認識は使えないことがあります。
    </div>

    <div class="grid">
      <section class="panel">
        <h2>1. Script</h2>

        <label for="scriptText">読み上げたい英文・日本語文</label>
        <textarea id="scriptText" placeholder="ここに練習したい文章を貼り付けてください。"></textarea>
        <div class="stats" id="scriptStats">文字数: 0 / 語数: 0</div>

        <div class="button-row">
          <button id="clearScriptBtn" type="button" class="secondary">Clear Script</button>
          <button id="downloadScriptBtn" type="button" class="secondary">Download Script</button>
        </div>

        <div class="divider"></div>

        <h2>2. Text to Speech</h2>

        <div class="row">
          <div>
            <label for="ttsLang">Language</label>
            <select id="ttsLang">
              <option value="en-US" selected>English (US)</option>
              <option value="en-GB">English (UK)</option>
              <option value="ja-JP">Japanese</option>
            </select>
          </div>

          <div>
            <label for="voiceSelect">Voice</label>
            <select id="voiceSelect"></select>
          </div>

          <div>
            <label for="loopRead">Read mode</label>
            <select id="loopRead">
              <option value="once" selected>Once</option>
              <option value="loop">Loop</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="slider-wrap">
            <label for="rateRange">Rate</label>
            <input id="rateRange" type="range" min="0.5" max="1.5" step="0.1" value="1.0" />
            <div class="slider-value" id="rateValue">1.0</div>
          </div>

          <div class="slider-wrap">
            <label for="pitchRange">Pitch</label>
            <input id="pitchRange" type="range" min="0.5" max="1.5" step="0.1" value="1.0" />
            <div class="slider-value" id="pitchValue">1.0</div>
          </div>

          <div class="slider-wrap">
            <label for="volumeRange">Volume</label>
            <input id="volumeRange" type="range" min="0.1" max="1.0" step="0.1" value="1.0" />
            <div class="slider-value" id="volumeValue">1.0</div>
          </div>
        </div>

        <div class="button-row">
          <button id="speakBtn" type="button">Read Aloud</button>
          <button id="pauseBtn" type="button" class="secondary">Pause</button>
          <button id="resumeBtn" type="button" class="secondary">Resume</button>
          <button id="stopSpeakBtn" type="button" class="danger">Stop Reading</button>
        </div>
      </section>

      <section class="panel">
        <h2>3. Recording & Speech Recognition</h2>

        <div class="row-2">
          <div>
            <label for="recognitionLang">Recognition language</label>
            <select id="recognitionLang">
              <option value="en-US" selected>English (US)</option>
              <option value="en-GB">English (UK)</option>
              <option value="ja-JP">Japanese</option>
            </select>
          </div>

          <div>
            <label for="appendMode">Transcript mode</label>
            <select id="appendMode">
              <option value="append" selected>Append to existing text</option>
              <option value="replace">Replace transcript</option>
            </select>
          </div>
        </div>

        <div class="button-row">
          <button id="startBtn" type="button">Start</button>
          <button id="stopBtn" type="button" class="danger" disabled>Stop</button>
          <button id="downloadBtn" type="button" class="secondary" disabled>Download Audio</button>
        </div>

        <audio id="audioPlayer" controls class="audio-player"></audio>

        <div class="divider"></div>

        <label for="transcript">Transcript</label>
        <textarea
          id="transcript"
          class="small-textarea"
          placeholder="書き起こしがここに表示されます。"
        ></textarea>
        <div class="stats" id="transcriptStats">文字数: 0 / 語数: 0</div>

        <div class="button-row">
          <button id="clearTranscriptBtn" type="button" class="secondary">Clear Transcript</button>
          <button id="downloadTranscriptBtn" type="button" class="secondary">Download Transcript</button>
        </div>

        <div id="status" class="status">Ready.</div>
      </section>
    </div>

    <p class="footer-note">
      補足: 音声認識はブラウザ依存が大きいため、うまく動かない環境では録音機能だけ使ってください。
    </p>
  </div>

 <script>

  timerCircle.style.strokeDasharray = CIRCUMFERENCE;
  timerCircle.style.strokeDashoffset = 0;
  lucide.createIcons();

  function isSecureEnough() {
    return window.isSecureContext || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  }

  function isMobileLike() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  function streamHasLiveTracks(stream) {
    return !!stream && stream.getAudioTracks().some(track => track.readyState === 'live');
  }

  function chooseSupportedMimeType() {
    if (!hasMediaRecorderSupport) return '';

    const candidates = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/mp4;codecs=mp4a.40.2',
      'audio/mp4',
      'audio/ogg;codecs=opus',
      'audio/ogg'
    ];

    for (const type of candidates) {
      try {
        if (MediaRecorder.isTypeSupported(type)) {
          return type;
        }
      } catch (e) {}
    }

    return '';
  }

  function getCurrentTranscript() {
    return `${finalTranscript} ${interimTranscript}`.replace(/\s+/g, ' ').trim();
  }

  function normalizeAudioId(id) {
    return String(id ?? '').trim();
  }

  function getPossibleAudioKeys(id) {
    const normalized = normalizeAudioId(id);
    const keys = [normalized];

    if (/^\d+$/.test(normalized)) {
      const numericKey = Number(normalized);
      if (String(numericKey) === normalized) {
        keys.push(numericKey);
      }
    }

    return keys;
  }

  function getAudioExtensionFromMimeType(mimeType = '') {
    const t = String(mimeType || '').toLowerCase();
    if (t.includes('webm')) return 'weba';
    if (t.includes('mp4')) return 'm4a';
    if (t.includes('mpeg') || t.includes('mp3')) return 'mp3';
    if (t.includes('wav')) return 'wav';
    if (t.includes('ogg')) return 'ogg';
    return 'weba';
  }

  function escapeHtml(str = '') {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function clearRenderedAudioUrls() {
    renderedAudioUrls.forEach(url => URL.revokeObjectURL(url));
    renderedAudioUrls = [];
  }

  function blobToDataUrl(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  function dataUrlToBlob(dataUrl) {
    const [meta, base64] = dataUrl.split(',');
    const mimeMatch = meta.match(/data:(.*?);base64/);
    const mime = mimeMatch ? mimeMatch[1] : 'application/octet-stream';
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);

    for (let i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }

    return new Blob([bytes], { type: mime });
  }

  function postLauncherSignal(path, useBeacon = false) {
    if (!path) return;
    if (!(location.protocol === 'http:' || location.protocol === 'https:')) return;

    try {
      if (useBeacon && navigator.sendBeacon) {
        const ok = navigator.sendBeacon(path, '1');
        if (ok) return;
      }

      fetch(path, {
        method: 'POST',
        body: '1',
        keepalive: true,
        cache: 'no-store',
        headers: { 'Content-Type': 'text/plain' }
      }).catch(() => {});
    } catch (e) {}
  }

  function startAppHeartbeat() {
    if (!(location.protocol === 'http:' || location.protocol === 'https:')) return;

    stopAppHeartbeat();
    postLauncherSignal('/__ping__');

    appHeartbeatTimer = setInterval(() => {
      if (isAppClosing) return;
      postLauncherSignal('/__ping__');
    }, APP_HEARTBEAT_INTERVAL_MS);
  }

  function stopAppHeartbeat() {
    if (appHeartbeatTimer) {
      clearInterval(appHeartbeatTimer);
      appHeartbeatTimer = null;
    }
  }

  function openAudioDb() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(AUDIO_DB_NAME, AUDIO_DB_VERSION);

      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(AUDIO_STORE_NAME)) {
          db.createObjectStore(AUDIO_STORE_NAME, { keyPath: 'id' });
        }
      };

      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async function saveAudioBlob(id, blob) {
    if (!blob) return;

    const key = normalizeAudioId(id);
    const db = await openAudioDb();

    return new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE_NAME, 'readwrite');
      const store = tx.objectStore(AUDIO_STORE_NAME);

      store.put({
        id: key,
        blob,
        mimeType: blob.type || 'audio/webm',
        savedAt: new Date().toISOString()
      });

      tx.oncomplete = () => {
        db.close();
        resolve();
      };
      tx.onerror = () => {
        db.close();
        reject(tx.error);
      };
    });
  }

  async function getAudioEntry(id) {
    const keys = getPossibleAudioKeys(id);
    const db = await openAudioDb();

    return new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE_NAME, 'readonly');
      const store = tx.objectStore(AUDIO_STORE_NAME);
      let index = 0;

      const tryNext = () => {
        if (index >= keys.length) {
          db.close();
          resolve(null);
          return;
        }

        const request = store.get(keys[index]);
        index += 1;

        request.onsuccess = () => {
          if (request.result) {
            db.close();
            resolve(request.result);
          } else {
            tryNext();
          }
        };

        request.onerror = () => {
          db.close();
          reject(request.error);
        };
      };

      tryNext();
    });
  }

  async function getAudioBlob(id) {
    const entry = await getAudioEntry(id);
    return entry?.blob || null;
  }

  async function deleteAudioBlob(id) {
    const keys = getPossibleAudioKeys(id);
    const db = await openAudioDb();

    return new Promise((resolve, reject) => {
      const tx = db.transaction(AUDIO_STORE_NAME, 'readwrite');
      const store = tx.objectStore(AUDIO_STORE_NAME);

      for (const key of keys) {
        store.delete(key);
      }

      tx.oncomplete = () => {
        db.close();
        resolve();
      };
      tx.onerror = () => {
        db.close();
        reject(tx.error);
      };
    });
  }

      function getRecognitionLanguage() {
