<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeechPractice</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #d9e0ea;
      --text: #1d2433;
      --sub: #5b667a;
      --accent: #2f6fed;
      --accent2: #1f56c2;
      --danger: #c0392b;
      --ok: #1f8f4e;
      --shadow: 0 8px 24px rgba(20, 31, 61, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px;
    }

    .app-title {
      margin: 0 0 8px;
      font-size: 1.9rem;
      font-weight: 700;
    }

    .app-subtitle {
      margin: 0 0 20px;
      color: var(--sub);
      font-size: 0.98rem;
    }

    .notice {
      background: #eef4ff;
      border: 1px solid #cfe0ff;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      color: #27406d;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }

    @media (max-width: 920px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
    }

    .panel h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    textarea,
    select,
    input[type="range"] {
      width: 100%;
    }

    textarea,
    select {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    .small-textarea {
      min-height: 150px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }
    }

    .row-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    @media (max-width: 700px) {
      .row-2 {
        grid-template-columns: 1fr;
      }
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: 0.15s ease;
    }

    button:hover {
      background: var(--accent2);
    }

    button.secondary {
      background: #eef2f8;
      color: #24324a;
      border: 1px solid var(--line);
    }

    button.secondary:hover {
      background: #e5ebf5;
    }

    button.danger {
      background: var(--danger);
    }

    button.success {
      background: var(--ok);
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .stats {
      margin-top: 8px;
      color: var(--sub);
      font-size: 0.9rem;
    }

    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcfe;
      color: #31405c;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .slider-wrap {
      display: grid;
      gap: 6px;
    }

    .slider-value {
      color: var(--sub);
      font-size: 0.88rem;
    }

    .audio-player {
      width: 100%;
      margin-top: 10px;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--sub);
      font-size: 0.88rem;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="app-title">SpeechPractice</h1>
    <p class="app-subtitle">
      スクリプト読み上げ・録音・音声認識を1つにまとめた練習アプリ
    </p>

    <div class="notice">
      推奨環境は <strong>Windows の Edge</strong> です。<br>
      端末やブラウザによっては、録音のみ動作し、音声認識は使えないことがあります。
    </div>

    <div class="grid">
      <section class="panel">
        <h2>1. Script</h2>

        <label for="scriptText">読み上げたい英文・日本語文</label>
        <textarea id="scriptText" placeholder="ここに練習したい文章を貼り付けてください。"></textarea>
        <div class="stats" id="scriptStats">文字数: 0 / 語数: 0</div>

        <div class="button-row">
          <button id="clearScriptBtn" type="button" class="secondary">Clear Script</button>
          <button id="downloadScriptBtn" type="button" class="secondary">Download Script</button>
        </div>

        <div class="divider"></div>

        <h2>2. Text to Speech</h2>

        <div class="row">
          <div>
            <label for="ttsLang">Language</label>
            <select id="ttsLang">
              <option value="en-US" selected>English (US)</option>
              <option value="en-GB">English (UK)</option>
              <option value="ja-JP">Japanese</option>
            </select>
          </div>

          <div>
            <label for="voiceSelect">Voice</label>
            <select id="voiceSelect"></select>
          </div>

          <div>
            <label for="loopRead">Read mode</label>
            <select id="loopRead">
              <option value="once" selected>Once</option>
              <option value="loop">Loop</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="slider-wrap">
            <label for="rateRange">Rate</label>
            <input id="rateRange" type="range" min="0.5" max="1.5" step="0.1" value="1.0" />
            <div class="slider-value" id="rateValue">1.0</div>
          </div>

          <div class="slider-wrap">
            <label for="pitchRange">Pitch</label>
            <input id="pitchRange" type="range" min="0.5" max="1.5" step="0.1" value="1.0" />
            <div class="slider-value" id="pitchValue">1.0</div>
          </div>

          <div class="slider-wrap">
            <label for="volumeRange">Volume</label>
            <input id="volumeRange" type="range" min="0.1" max="1.0" step="0.1" value="1.0" />
            <div class="slider-value" id="volumeValue">1.0</div>
          </div>
        </div>

        <div class="button-row">
          <button id="speakBtn" type="button">Read Aloud</button>
          <button id="pauseBtn" type="button" class="secondary">Pause</button>
          <button id="resumeBtn" type="button" class="secondary">Resume</button>
          <button id="stopSpeakBtn" type="button" class="danger">Stop Reading</button>
        </div>
      </section>

      <section class="panel">
        <h2>3. Recording & Speech Recognition</h2>

        <div class="row-2">
          <div>
            <label for="recognitionLang">Recognition language</label>
            <select id="recognitionLang">
              <option value="en-US" selected>English (US)</option>
              <option value="en-GB">English (UK)</option>
              <option value="ja-JP">Japanese</option>
            </select>
          </div>

          <div>
            <label for="appendMode">Transcript mode</label>
            <select id="appendMode">
              <option value="append" selected>Append to existing text</option>
              <option value="replace">Replace transcript</option>
            </select>
          </div>
        </div>

        <div class="button-row">
          <button id="startBtn" type="button">Start</button>
          <button id="stopBtn" type="button" class="danger" disabled>Stop</button>
          <button id="downloadBtn" type="button" class="secondary" disabled>Download Audio</button>
        </div>

        <audio id="audioPlayer" controls class="audio-player"></audio>

        <div class="divider"></div>

        <label for="transcript">Transcript</label>
        <textarea
          id="transcript"
          class="small-textarea"
          placeholder="書き起こしがここに表示されます。"
        ></textarea>
        <div class="stats" id="transcriptStats">文字数: 0 / 語数: 0</div>

        <div class="button-row">
          <button id="clearTranscriptBtn" type="button" class="secondary">Clear Transcript</button>
          <button id="downloadTranscriptBtn" type="button" class="secondary">Download Transcript</button>
        </div>

        <div id="status" class="status">Ready.</div>
      </section>
    </div>

    <p class="footer-note">
      補足: 音声認識はブラウザ依存が大きいため、うまく動かない環境では録音機能だけ使ってください。
    </p>
  </div>

  <script>
    (() => {
      "use strict";

      // ===== Elements =====
      const scriptText = document.getElementById("scriptText");
      const scriptStats = document.getElementById("scriptStats");
      const clearScriptBtn = document.getElementById("clearScriptBtn");
      const downloadScriptBtn = document.getElementById("downloadScriptBtn");

      const ttsLang = document.getElementById("ttsLang");
      const voiceSelect = document.getElementById("voiceSelect");
      const loopRead = document.getElementById("loopRead");
      const rateRange = document.getElementById("rateRange");
      const pitchRange = document.getElementById("pitchRange");
      const volumeRange = document.getElementById("volumeRange");
      const rateValue = document.getElementById("rateValue");
      const pitchValue = document.getElementById("pitchValue");
      const volumeValue = document.getElementById("volumeValue");
      const speakBtn = document.getElementById("speakBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const resumeBtn = document.getElementById("resumeBtn");
      const stopSpeakBtn = document.getElementById("stopSpeakBtn");

      const recognitionLangEl = document.getElementById("recognitionLang");
      const appendMode = document.getElementById("appendMode");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const audioPlayer = document.getElementById("audioPlayer");
      const transcriptEl = document.getElementById("transcript");
      const transcriptStats = document.getElementById("transcriptStats");
      const clearTranscriptBtn = document.getElementById("clearTranscriptBtn");
      const downloadTranscriptBtn = document.getElementById("downloadTranscriptBtn");
      const statusEl = document.getElementById("status");

      // ===== Utility =====
      function setStatus(message) {
        statusEl.textContent = message;
        console.log("[SpeechPractice]", message);
      }

      function countWords(text) {
        const trimmed = text.trim();
        if (!trimmed) return 0;
        return trimmed.split(/\s+/).length;
      }

      function updateScriptStats() {
        const text = scriptText.value || "";
        scriptStats.textContent = `文字数: ${text.length} / 語数: ${countWords(text)}`;
      }

      function updateTranscriptStats() {
        const text = transcriptEl.value || "";
        transcriptStats.textContent = `文字数: ${text.length} / 語数: ${countWords(text)}`;
      }

      function downloadTextFile(filename, content) {
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function isSecureEnough() {
        return (
          window.isSecureContext ||
          location.hostname === "localhost" ||
          location.hostname === "127.0.0.1"
        );
      }

      function isMobileLike() {
        return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      }

      // ===== Script buttons =====
      scriptText.addEventListener("input", updateScriptStats);
      transcriptEl.addEventListener("input", updateTranscriptStats);

      clearScriptBtn.addEventListener("click", () => {
        scriptText.value = "";
        updateScriptStats();
        setStatus("Script cleared.");
      });

      downloadScriptBtn.addEventListener("click", () => {
        downloadTextFile("speechpractice-script.txt", scriptText.value || "");
        setStatus("Script downloaded.");
      });

      clearTranscriptBtn.addEventListener("click", () => {
        transcriptEl.value = "";
        updateTranscriptStats();
        setStatus("Transcript cleared.");
      });

      downloadTranscriptBtn.addEventListener("click", () => {
        downloadTextFile("speechpractice-transcript.txt", transcriptEl.value || "");
        setStatus("Transcript downloaded.");
      });

      updateScriptStats();
      updateTranscriptStats();

      // ===== Text to Speech =====
      let voices = [];
      let currentUtterance = null;
      let loopEnabled = false;
      let manualSpeechStop = false;

      function refreshSliderLabels() {
        rateValue.textContent = Number(rateRange.value).toFixed(1);
        pitchValue.textContent = Number(pitchRange.value).toFixed(1);
        volumeValue.textContent = Number(volumeRange.value).toFixed(1);
      }

      refreshSliderLabels();
      rateRange.addEventListener("input", refreshSliderLabels);
      pitchRange.addEventListener("input", refreshSliderLabels);
      volumeRange.addEventListener("input", refreshSliderLabels);

      function getLanguagePrefix(lang) {
        return (lang || "en-US").split("-")[0];
      }

      function populateVoices() {
        voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
        const currentLang = ttsLang.value;
        const prevValue = voiceSelect.value;

        voiceSelect.innerHTML = "";

        let filtered = voices.filter(v => (v.lang || "").toLowerCase() === currentLang.toLowerCase());

        if (!filtered.length) {
          filtered = voices.filter(v => (v.lang || "").toLowerCase().startsWith(getLanguagePrefix(currentLang).toLowerCase()));
        }

        if (!filtered.length) {
          filtered = voices.slice();
        }

        if (!filtered.length) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "No voices found";
          voiceSelect.appendChild(opt);
          return;
        }

        filtered.forEach((voice, idx) => {
          const opt = document.createElement("option");
          opt.value = voice.name;
          opt.textContent = `${voice.name} (${voice.lang})`;
          if (voice.default) {
            opt.textContent += " [default]";
          }
          if (voice.name === prevValue) {
            opt.selected = true;
          }
          voiceSelect.appendChild(opt);
        });

        if (!voiceSelect.value && filtered[0]) {
          voiceSelect.value = filtered[0].name;
        }
      }

      function getSelectedVoice() {
        const name = voiceSelect.value;
        return voices.find(v => v.name === name) || null;
      }

      function stopSpeech() {
        manualSpeechStop = true;
        loopEnabled = false;
        if (window.speechSynthesis) {
          speechSynthesis.cancel();
        }
        currentUtterance = null;
      }

      function startSpeech() {
        const text = (scriptText.value || "").trim();
        if (!text) {
          setStatus("Script が空です。読み上げる文章を入力してください。");
          return;
        }

        if (!("speechSynthesis" in window)) {
          setStatus("このブラウザでは読み上げに対応していません。");
          return;
        }

        stopSpeech();
        manualSpeechStop = false;
        loopEnabled = loopRead.value === "loop";

        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = ttsLang.value;
        utter.rate = Number(rateRange.value);
        utter.pitch = Number(pitchRange.value);
        utter.volume = Number(volumeRange.value);

        const selectedVoice = getSelectedVoice();
        if (selectedVoice) {
          utter.voice = selectedVoice;
        }

        utter.onstart = () => {
          setStatus("読み上げ中です。");
        };

        utter.onend = () => {
          currentUtterance = null;
          if (loopEnabled && !manualSpeechStop) {
            setTimeout(() => {
              if (!manualSpeechStop) {
                startSpeech();
              }
            }, 250);
          } else {
            setStatus("読み上げが終了しました。");
          }
        };

        utter.onerror = (e) => {
          currentUtterance = null;
          setStatus(`読み上げエラー: ${e.error || "unknown"}`);
        };

        currentUtterance = utter;
        speechSynthesis.speak(utter);
      }

      if ("speechSynthesis" in window) {
        populateVoices();
        if (typeof speechSynthesis.onvoiceschanged !== "undefined") {
          speechSynthesis.onvoiceschanged = populateVoices;
        }
      } else {
        voiceSelect.innerHTML = '<option value="">Speech synthesis not supported</option>';
      }

      ttsLang.addEventListener("change", populateVoices);
      speakBtn.addEventListener("click", startSpeech);

      pauseBtn.addEventListener("click", () => {
        if ("speechSynthesis" in window && speechSynthesis.speaking && !speechSynthesis.paused) {
          speechSynthesis.pause();
          setStatus("読み上げを一時停止しました。");
        }
      });

      resumeBtn.addEventListener("click", () => {
        if ("speechSynthesis" in window && speechSynthesis.paused) {
          speechSynthesis.resume();
          setStatus("読み上げを再開しました。");
        }
      });

      stopSpeakBtn.addEventListener("click", () => {
        stopSpeech();
        setStatus("読み上げを停止しました。");
      });

      // ===== Recording & Speech Recognition =====
      const SpeechRecognitionClass =
        window.SpeechRecognition || window.webkitSpeechRecognition || null;

      const hasGetUserMedia =
        !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

      const hasMediaRecorder =
        typeof window.MediaRecorder !== "undefined";

      let mediaStream = null;
      let mediaRecorder = null;
      let recognition = null;

      let recordedChunks = [];
      let recordedBlob = null;
      let recordedUrl = "";

      let isSessionActive = false;
      let manualStop = false;
      let shouldRestartRecognition = false;
      let recognitionStarted = false;

      let transcriptBase = "";
      let finalTranscript = "";

      function cleanupAudioUrl() {
        if (recordedUrl) {
          URL.revokeObjectURL(recordedUrl);
          recordedUrl = "";
        }
      }

      function resetRecordingData() {
        recordedChunks = [];
        recordedBlob = null;
        cleanupAudioUrl();
        audioPlayer.removeAttribute("src");
        audioPlayer.load();
        downloadBtn.disabled = true;
      }

      function stopAllTracks() {
        if (mediaStream) {
          mediaStream.getTracks().forEach(track => {
            try {
              track.stop();
            } catch (e) {}
          });
          mediaStream = null;
        }
      }

      function stopRecognitionSafe() {
        shouldRestartRecognition = false;
        if (recognition) {
          try {
            recognition.stop();
          } catch (e) {}
        }
      }

      function setButtonsForIdle() {
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }

      function setButtonsForActive() {
        startBtn.disabled = true;
        stopBtn.disabled = false;
      }

      function getRecognitionLanguage() {
        return recognitionLangEl.value || "en-US";
      }

      function chooseSupportedMimeType() {
        if (!hasMediaRecorder) return "";

        const candidates = [
          "audio/webm;codecs=opus",
          "audio/webm",
          "audio/mp4;codecs=mp4a.40.2",
          "audio/mp4",
          "audio/ogg;codecs=opus",
          "audio/ogg"
        ];

        for (const type of candidates) {
          try {
            if (MediaRecorder.isTypeSupported(type)) {
              return type;
            }
          } catch (e) {}
        }
        return "";
      }

      function guessExtensionFromMime(mimeType) {
        const t = (mimeType || "").toLowerCase();
        if (t.includes("mp4")) return "m4a";
        if (t.includes("ogg")) return "ogg";
        if (t.includes("webm")) return "weba";
        return "bin";
      }

      function appendOrReplaceTranscript(interimText) {
        transcriptEl.value = transcriptBase + finalTranscript + interimText;
        updateTranscriptStats();
      }

      function makeRecognition() {
        if (!SpeechRecognitionClass) return null;

        const r = new SpeechRecognitionClass();
        r.lang = getRecognitionLanguage();
        r.continuous = true;
        r.interimResults = true;
        r.maxAlternatives = 1;

        r.onstart = () => {
          recognitionStarted = true;
          setStatus("Listening... speech recognition started.");
        };

        r.onresult = (event) => {
          let interimTranscript = "";

          for (let i = event.resultIndex; i < event.results.length; i++) {
            const result = event.results[i];
            const text = result[0] ? result[0].transcript : "";

            if (result.isFinal) {
              finalTranscript += text;
              if (!/\s$/.test(finalTranscript)) {
                finalTranscript += " ";
              }
            } else {
              interimTranscript += text;
            }
          }

          appendOrReplaceTranscript(interimTranscript);
        };

        r.onerror = (event) => {
          const code = event && event.error ? event.error : "unknown";
          let message = `Speech recognition error: ${code}`;

          switch (code) {
            case "not-allowed":
            case "service-not-allowed":
              message += " / microphone or speech service permission denied.";
              shouldRestartRecognition = false;
              break;
            case "audio-capture":
              message += " / microphone capture failed.";
              shouldRestartRecognition = false;
              break;
            case "language-not-supported":
              message += " / selected language not supported in this browser.";
              shouldRestartRecognition = false;
              break;
            case "network":
              message += " / network issue. Recognition may depend on online service.";
              break;
            case "no-speech":
              message += " / no speech detected.";
              break;
            case "aborted":
              message += " / recognition aborted.";
              break;
          }

          setStatus(message);
        };

        r.onend = () => {
          recognitionStarted = false;

          if (isSessionActive && shouldRestartRecognition && !manualStop) {
            setTimeout(() => {
              if (!recognition) return;
              try {
                recognition.lang = getRecognitionLanguage();
                recognition.start();
              } catch (e) {
                setStatus("Recognition ended. Auto-restart failed on this browser.");
              }
            }, isMobileLike() ? 600 : 250);
          } else if (isSessionActive) {
            setStatus("Recording continues. Speech recognition stopped on this browser.");
          }
        };

        return r;
      }

      async function startSession() {
        if (isSessionActive) return;

        if (!isSecureEnough()) {
          setStatus("Microphone access requires HTTPS or localhost.");
          return;
        }

        if (!hasGetUserMedia) {
          setStatus("This browser does not support microphone capture.");
          return;
        }

        manualStop = false;
        isSessionActive = true;
        shouldRestartRecognition = true;
        recognitionStarted = false;

        setButtonsForActive();
        resetRecordingData();

        if (appendMode.value === "append") {
          transcriptBase = transcriptEl.value ? transcriptEl.value.trimEnd() + "\n" : "";
        } else {
          transcriptBase = "";
          transcriptEl.value = "";
          updateTranscriptStats();
        }

        finalTranscript = "";

        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true
            }
          });
        } catch (err) {
          console.error(err);
          isSessionActive = false;
          setButtonsForIdle();

          if (err && err.name === "NotAllowedError") {
            setStatus("Microphone permission was denied.");
          } else if (err && err.name === "NotFoundError") {
            setStatus("No microphone was found.");
          } else {
            setStatus("Failed to access microphone.");
          }
          return;
        }

        if (hasMediaRecorder) {
          try {
            const mimeType = chooseSupportedMimeType();
            mediaRecorder = mimeType
              ? new MediaRecorder(mediaStream, { mimeType })
              : new MediaRecorder(mediaStream);

            recordedChunks = [];

            mediaRecorder.ondataavailable = (event) => {
              if (event.data && event.data.size > 0) {
                recordedChunks.push(event.data);
              }
            };

            mediaRecorder.onerror = (event) => {
              console.error("MediaRecorder error:", event);
              setStatus("Recording error occurred.");
            };

            mediaRecorder.onstop = () => {
              const actualType =
                (mediaRecorder && mediaRecorder.mimeType) ||
                chooseSupportedMimeType() ||
                "audio/webm";

              if (recordedChunks.length > 0) {
                recordedBlob = new Blob(recordedChunks, { type: actualType });
                cleanupAudioUrl();
                recordedUrl = URL.createObjectURL(recordedBlob);
                audioPlayer.src = recordedUrl;
                audioPlayer.load();
                downloadBtn.disabled = false;
                setStatus(`Recording finished. Audio ready (${actualType || "browser default"}).`);
              } else {
                setStatus("Recording finished, but no audio data was captured.");
              }

              stopAllTracks();
            };

            mediaRecorder.start(1000);
          } catch (err) {
            console.error(err);
            mediaRecorder = null;
            setStatus("Microphone opened, but recording is not supported in this browser.");
          }
        } else {
          setStatus("Microphone opened, but recording is not supported in this browser.");
        }

        if (SpeechRecognitionClass) {
          recognition = makeRecognition();
          if (recognition) {
            try {
              recognition.start();
            } catch (err) {
              console.error(err);
              setStatus("Recording started. Speech recognition could not start on this browser.");
            }
          }
        } else {
          setStatus("Recording started. Speech recognition is not supported in this browser.");
        }
      }

      function stopSession() {
        if (!isSessionActive) return;

        manualStop = true;
        isSessionActive = false;
        shouldRestartRecognition = false;

        stopRecognitionSafe();

        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          try {
            mediaRecorder.stop();
          } catch (e) {
            stopAllTracks();
          }
        } else {
          stopAllTracks();
        }

        setButtonsForIdle();

        if (!recordedChunks.length) {
          setStatus("Stopped.");
        }
      }

      downloadBtn.addEventListener("click", () => {
        if (!recordedBlob) {
          setStatus("No audio available to download.");
          return;
        }

        const mimeType = recordedBlob.type || "";
        const ext = guessExtensionFromMime(mimeType);
        const fileName = `speechpractice-audio.${ext}`;

        const a = document.createElement("a");
        a.href = recordedUrl || URL.createObjectURL(recordedBlob);
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();

        setStatus(`Downloaded: ${fileName}`);
      });

      startBtn.addEventListener("click", startSession);
      stopBtn.addEventListener("click", stopSession);

      recognitionLangEl.addEventListener("change", () => {
        if (recognition) {
          recognition.lang = getRecognitionLanguage();
        }
      });

      if (!isSecureEnough()) {
        setStatus("Open this page via HTTPS or localhost to use the microphone.");
      } else if (!hasGetUserMedia) {
        setStatus("This browser does not support microphone capture.");
      } else if (!SpeechRecognitionClass) {
        setStatus("This browser can record audio, but speech recognition is not supported.");
      } else {
        setStatus("Ready. Press Start.");
      }

      window.addEventListener("beforeunload", () => {
        try {
          stopSpeech();
        } catch (e) {}
        try {
          stopRecognitionSafe();
        } catch (e) {}
        try {
          if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
          }
        } catch (e) {}
        try {
          stopAllTracks();
        } catch (e) {}
        try {
          cleanupAudioUrl();
        } catch (e) {}
      });
    })();
  </script>
</body>
</html>
